<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Calor — Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #f0c040;
    --accent2: #e06060;
    --accent3: #50c8a0;
    --text: #e8e8f0;
    --text-dim: #6060808;
    --cell-1: #0d2137;
    --cell-2: #0e4a2e;
    --cell-3: #5a6d00;
    --cell-4: #8a4200;
    --cell-5: #7a0f0f;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrapper { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

  /* HEADER */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .header-left h1 {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .header-left p {
    font-size: 13px;
    color: #555570;
    margin-top: 4px;
    font-family: var(--font-mono);
  }
  .header-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  
  .btn {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    padding: 10px 18px;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .btn:hover::after { opacity: 0.08; }
  .btn-primary { background: var(--accent); color: #0a0a0f; }
  .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-danger { background: var(--accent2); color: white; }

  /* GRID CONTROLS */
  .config-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
    background: var(--surface);
    padding: 16px 20px;
    border: 1px solid var(--border);
  }
  .config-group { display: flex; align-items: center; gap: 10px; }
  .config-group label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555570;
  }
  .config-group input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 10px;
    width: 160px;
    outline: none;
    transition: border-color 0.2s;
  }
  .config-group input:focus { border-color: var(--accent); }
  .config-group input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 10px;
    width: 60px;
    outline: none;
  }
  .config-group input[type="number"]:focus { border-color: var(--accent); }

  /* LAYOUT */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 24px;
  }

  /* HEATMAP SECTION */
  .heatmap-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
  }
  .panel-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #555570;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-label::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
  }

  .heatmap-container { overflow: auto; }

  .heatmap-table { border-collapse: collapse; width: 100%; }

  .heatmap-table th {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 12px;
    background: #0d0d14;
    color: #555570;
    border: 1px solid var(--border);
    white-space: nowrap;
    min-width: 90px;
  }
  .heatmap-table th.row-header { min-width: 130px; text-align: left; }

  .col-header-input, .row-header-input {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
    width: 100%;
    outline: none;
    cursor: pointer;
  }
  .col-header-input:focus, .row-header-input:focus {
    color: var(--accent);
    border-bottom: 1px solid var(--accent);
  }
  .row-header-input { text-align: left; }

  .cell {
    border: 1px solid rgba(255,255,255,0.04);
    padding: 0;
    position: relative;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .cell:hover { transform: scale(1.05); z-index: 10; }

  .cell-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 8px;
    min-height: 72px;
    min-width: 90px;
  }

  .cell-value {
    font-family: var(--font-mono);
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    color: rgba(255,255,255,0.95);
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .cell-label {
    font-size: 9px;
    font-family: var(--font-mono);
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .cell-edit {
    position: absolute;
    inset: 0;
    background: rgba(240,192,64,0.12);
    border: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
  }
  .cell-edit input {
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    width: 80%;
    outline: none;
  }

  /* COLOR LEVELS */
  .lvl-1 { background: #061520; }
  .lvl-2 { background: #072f1c; }
  .lvl-3 { background: #1a3a00; }
  .lvl-4 { background: #3d2200; }
  .lvl-5 { background: #4a0a0a; }
  .lvl-1 .cell-value { color: #4a9fd4; }
  .lvl-2 .cell-value { color: #5dc88a; }
  .lvl-3 .cell-value { color: #b8d42a; }
  .lvl-4 .cell-value { color: #f08c20; }
  .lvl-5 .cell-value { color: #e84040; }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 20px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
  }

  /* LEGEND */
  .legend { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 10px;
  }
  .legend-swatch {
    width: 28px;
    height: 16px;
    flex-shrink: 0;
  }
  .legend-range { color: #555570; }

  /* MINI BAR CHART */
  .chart-area { margin-top: 14px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
  }
  .bar-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: #555570;
    width: 80px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bar-track {
    flex: 1;
    height: 14px;
    background: var(--bg);
    position: relative;
  }
  .bar-fill {
    height: 100%;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  .bar-fill::after {
    content: attr(data-val);
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-mono);
    font-size: 8px;
    color: rgba(255,255,255,0.7);
  }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 12px;
  }
  .stat-val {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-lbl {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #555570;
    margin-top: 2px;
  }

  /* DISTRIBUTION MINI CHART */
  .dist-chart {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 50px;
    margin-top: 14px;
  }
  .dist-bar {
    flex: 1;
    transition: height 0.4s;
    cursor: default;
    position: relative;
  }
  .dist-bar:hover::after {
    content: attr(data-label);
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    font-family: var(--font-mono);
    white-space: nowrap;
    background: #1e1e2e;
    padding: 2px 6px;
    color: var(--text);
    z-index: 50;
  }
  .dist-labels {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }
  .dist-lbl {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 7px;
    color: #333350;
    text-align: center;
  }

  /* TITLE INPUT */
  .title-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 4px 0;
    width: 100%;
    outline: none;
    margin-top: 12px;
    transition: border-color 0.2s;
  }
  .title-input:focus { border-bottom-color: var(--accent); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #0a0a0f;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    padding: 12px 20px;
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* PRINT / PDF */
  #pdf-capture {
    background: #0a0a0f;
  }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 16px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <h1>⬛ HEAT_MAP.editor</h1>
      <p>// Haz clic en cualquier celda para editar su valor</p>
    </div>
    <div class="header-controls">
      <button class="btn btn-ghost" onclick="addRow()">+ Fila</button>
      <button class="btn btn-ghost" onclick="addCol()">+ Columna</button>
      <button class="btn btn-danger" onclick="resetGrid()">↺ Reset</button>
      <button class="btn btn-primary" onclick="exportPDF()">⬇ Exportar PDF</button>
    </div>
  </header>

  <!-- CONFIG BAR -->
  <div class="config-bar">
    <div class="config-group">
      <label>Título</label>
      <input type="text" id="mapTitle" value="Análisis de Riesgo — Q1 2025" placeholder="Título del mapa...">
    </div>
    <div class="config-group">
      <label>Mín</label>
      <input type="number" id="minVal" value="0" onchange="updateHeatmap()">
    </div>
    <div class="config-group">
      <label>Máx</label>
      <input type="number" id="maxVal" value="100" onchange="updateHeatmap()">
    </div>
    <div class="config-group">
      <label>Etiqueta</label>
      <input type="text" id="unitLabel" value="%" placeholder="%, pts, $...">
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-grid" id="pdf-capture">

    <!-- HEATMAP -->
    <div class="heatmap-panel">
      <div class="panel-label">Mapa de Calor Editable</div>
      <div class="heatmap-container">
        <table class="heatmap-table" id="heatmap"></table>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- LEYENDA -->
      <div class="card">
        <div class="panel-label">Escala de Color</div>
        <div class="legend" id="legend"></div>
      </div>

      <!-- ESTADÍSTICAS -->
      <div class="card">
        <div class="panel-label">Indicadores Globales</div>
        <div class="stats-grid" id="statsGrid"></div>
      </div>

      <!-- DISTRIBUCIÓN -->
      <div class="card">
        <div class="panel-label">Distribución por Nivel</div>
        <div class="dist-chart" id="distChart"></div>
        <div class="dist-labels" id="distLabels"></div>
      </div>

      <!-- PROMEDIO POR FILA (BARRA) -->
      <div class="card">
        <div class="panel-label">Promedio por Categoría</div>
        <div class="chart-area" id="rowChart"></div>
      </div>

    </div>
  </div>

</div>

<div class="toast" id="toast">PDF generado con éxito</div>

<script>
// ---- DATA ----
let rows = ["Producción","Finanzas","Marketing","RRHH","Logística","TI"];
let cols = ["Ene","Feb","Mar","Abr","May","Jun"];
let data = [
  [72, 45, 88, 30, 91, 55],
  [35, 60, 42, 78, 25, 66],
  [55, 80, 65, 90, 47, 73],
  [20, 35, 50, 40, 65, 28],
  [85, 70, 60, 52, 75, 88],
  [40, 55, 72, 61, 44, 82],
];

function getMin() { return parseFloat(document.getElementById('minVal').value)||0; }
function getMax() { return parseFloat(document.getElementById('maxVal').value)||100; }
function getUnit() { return document.getElementById('unitLabel').value||''; }

function levelClass(v) {
  const min=getMin(), max=getMax(), range=max-min||1;
  const pct = (v-min)/range;
  if(pct<0.2) return 'lvl-1';
  if(pct<0.4) return 'lvl-2';
  if(pct<0.6) return 'lvl-3';
  if(pct<0.8) return 'lvl-4';
  return 'lvl-5';
}

function renderTable() {
  const tbl = document.getElementById('heatmap');
  tbl.innerHTML = '';
  const unit = getUnit();

  // Header row
  const thead = tbl.insertRow();
  const th0 = document.createElement('th');
  th0.className='row-header';
  th0.innerHTML = `<span style="font-family:var(--font-mono);font-size:10px;color:#333350">CATEGORÍA</span>`;
  thead.appendChild(th0);

  cols.forEach((c,j)=>{
    const th = document.createElement('th');
    th.innerHTML = `<input class="col-header-input" value="${c}" onblur="cols[${j}]=this.value;updateHeatmap()" onkeydown="if(event.key==='Enter')this.blur()">`;
    thead.appendChild(th);
  });

  // Data rows
  rows.forEach((r,i)=>{
    const tr = tbl.insertRow();
    const td0 = document.createElement('td');
    td0.style.cssText='background:#0d0d14;border:1px solid var(--border);padding:8px 12px;';
    td0.innerHTML = `<input class="row-header-input" value="${r}" onblur="rows[${i}]=this.value;updateSidebar()" onkeydown="if(event.key==='Enter')this.blur()">`;
    tr.appendChild(td0);

    cols.forEach((_,j)=>{
      const td = document.createElement('td');
      const v = data[i][j];
      td.className = 'cell '+levelClass(v);
      td.innerHTML = `<div class="cell-inner"><div class="cell-value">${v}</div><div class="cell-label">${unit}</div></div>`;
      td.onclick = ()=>startEdit(td,i,j);
      tr.appendChild(td);
    });
  });
}

function startEdit(td,i,j) {
  if(td.querySelector('.cell-edit')) return;
  const prev = td.querySelector('.cell-inner');
  const edit = document.createElement('div');
  edit.className='cell-edit';
  edit.innerHTML=`<input type="number" value="${data[i][j]}" min="${getMin()}" max="${getMax()}">`;
  td.appendChild(edit);
  const inp = edit.querySelector('input');
  inp.focus(); inp.select();
  function commit(){
    let v=parseFloat(inp.value);
    if(isNaN(v)) v=data[i][j];
    v=Math.min(getMax(),Math.max(getMin(),v));
    data[i][j]=v;
    edit.remove();
    td.className='cell '+levelClass(v);
    td.querySelector('.cell-inner').innerHTML=`<div class="cell-value">${v}</div><div class="cell-label">${getUnit()}</div>`;
    updateSidebar();
  }
  inp.onblur=commit;
  inp.onkeydown=e=>{ if(e.key==='Enter') commit(); if(e.key==='Escape'){edit.remove();} };
}

function addRow(){
  rows.push(`Fila ${rows.length+1}`);
  data.push(cols.map(()=>Math.round(Math.random()*100)));
  updateHeatmap();
}
function addCol(){
  cols.push(`Col${cols.length+1}`);
  data.forEach(r=>r.push(Math.round(Math.random()*100)));
  updateHeatmap();
}
function resetGrid(){
  rows=["Producción","Finanzas","Marketing","RRHH","Logística","TI"];
  cols=["Ene","Feb","Mar","Abr","May","Jun"];
  data=[[72,45,88,30,91,55],[35,60,42,78,25,66],[55,80,65,90,47,73],[20,35,50,40,65,28],[85,70,60,52,75,88],[40,55,72,61,44,82]];
  updateHeatmap();
}

function updateHeatmap(){ renderTable(); updateSidebar(); }

// ---- SIDEBAR ----
function updateSidebar(){ renderLegend(); renderStats(); renderDistribution(); renderRowChart(); }

function renderLegend(){
  const min=getMin(),max=getMax(),range=max-min||1;
  const levels=[
    {cls:'lvl-1',bg:'#061520',fg:'#4a9fd4',label:'Muy Bajo', lo:0, hi:0.2},
    {cls:'lvl-2',bg:'#072f1c',fg:'#5dc88a',label:'Bajo',lo:0.2,hi:0.4},
    {cls:'lvl-3',bg:'#1a3a00',fg:'#b8d42a',label:'Medio',lo:0.4,hi:0.6},
    {cls:'lvl-4',bg:'#3d2200',fg:'#f08c20',label:'Alto',lo:0.6,hi:0.8},
    {cls:'lvl-5',bg:'#4a0a0a',fg:'#e84040',label:'Crítico',lo:0.8,hi:1},
  ];
  const u=getUnit();
  document.getElementById('legend').innerHTML = levels.map(l=>`
    <div class="legend-item">
      <div class="legend-swatch" style="background:${l.bg};border:1px solid rgba(255,255,255,0.1)"></div>
      <span style="color:${l.fg};font-weight:700">${l.label}</span>
      <span class="legend-range">${Math.round(min+l.lo*range)}–${Math.round(min+l.hi*range)}${u}</span>
    </div>
  `).join('');
}

function allValues(){ return data.flat(); }

function renderStats(){
  const vals=allValues();
  const sum=vals.reduce((a,b)=>a+b,0);
  const avg=(sum/vals.length).toFixed(1);
  const mx=Math.max(...vals);
  const mn=Math.min(...vals);
  const sorted=[...vals].sort((a,b)=>a-b);
  const med=sorted.length%2===0?(sorted[sorted.length/2-1]+sorted[sorted.length/2])/2:sorted[Math.floor(sorted.length/2)];
  const u=getUnit();
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-box"><div class="stat-val">${avg}${u}</div><div class="stat-lbl">Promedio</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#e84040">${mx}${u}</div><div class="stat-lbl">Máximo</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#4a9fd4">${mn}${u}</div><div class="stat-lbl">Mínimo</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#5dc88a">${med}${u}</div><div class="stat-lbl">Mediana</div></div>
  `;
}

function renderDistribution(){
  const min=getMin(),max=getMax(),range=max-min||1;
  const buckets=[0,0,0,0,0];
  const labels=['Muy Bajo','Bajo','Medio','Alto','Crítico'];
  const colors=['#4a9fd4','#5dc88a','#b8d42a','#f08c20','#e84040'];
  allValues().forEach(v=>{
    const pct=(v-min)/range;
    const idx=Math.min(4,Math.floor(pct*5));
    buckets[idx]++;
  });
  const mx=Math.max(...buckets)||1;
  document.getElementById('distChart').innerHTML=buckets.map((b,i)=>`
    <div class="dist-bar" style="height:${(b/mx)*100}%;background:${colors[i]};opacity:0.85" data-label="${labels[i]}: ${b}"></div>
  `).join('');
  document.getElementById('distLabels').innerHTML=labels.map((l,i)=>`<div class="dist-lbl" style="color:${colors[i]}">${l.slice(0,3)}</div>`).join('');
}

function renderRowChart(){
  const colors=['#4a9fd4','#5dc88a','#b8d42a','#f08c20','#e84040','#c060d0','#60c0e0'];
  const maxAvg=Math.max(...rows.map((_,i)=>data[i].reduce((a,b)=>a+b,0)/data[i].length));
  document.getElementById('rowChart').innerHTML=rows.map((r,i)=>{
    const avg=(data[i].reduce((a,b)=>a+b,0)/data[i].length).toFixed(1);
    const pct=((avg/maxAvg)*100).toFixed(1);
    const c=colors[i%colors.length];
    return `<div class="bar-row">
      <div class="bar-label">${r}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${c}" data-val="${avg}${getUnit()}"></div>
      </div>
    </div>`;
  }).join('');
}

// ---- PDF EXPORT ----
async function exportPDF() {
  const { jsPDF } = window.jspdf;
  const title = document.getElementById('mapTitle').value || 'Mapa de Calor';
  showToast('Generando PDF...');

  // Temporarily hide controls
  const configBar = document.querySelector('.config-bar');
  const headerControls = document.querySelector('.header-controls');
  configBar.style.display='none';
  headerControls.style.display='none';

  await new Promise(r=>setTimeout(r,100));
  const el = document.getElementById('pdf-capture');

  try {
    const canvas = await html2canvas(el, {
      backgroundColor: '#0a0a0f',
      scale: 2,
      useCORS: true,
      logging: false,
    });

    const pdf = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
    const W=297, H=210;
    const imgW=canvas.width, imgH=canvas.height;
    const ratio=Math.min((W-20)/imgW,(H-30)/imgH);
    const iw=imgW*ratio, ih=imgH*ratio;
    const ix=(W-iw)/2, iy=25;

    // Header strip
    pdf.setFillColor(10,10,15);
    pdf.rect(0,0,W,H,'F');
    pdf.setFillColor(240,192,64);
    pdf.rect(0,0,W,10,'F');
    pdf.setTextColor(10,10,15);
    pdf.setFontSize(11);
    pdf.setFont('helvetica','bold');
    pdf.text(title.toUpperCase(), 14, 7);
    const now=new Date();
    pdf.setFontSize(8);
    pdf.text(`Generado: ${now.toLocaleDateString('es-CL')} ${now.toLocaleTimeString('es-CL')}`, W-14, 7, {align:'right'});

    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', ix, iy, iw, ih);

    // Footer
    pdf.setFillColor(20,20,30);
    pdf.rect(0,H-8,W,8,'F');
    pdf.setTextColor(80,80,120);
    pdf.setFontSize(7);
    pdf.text('HEAT_MAP.editor', 14, H-3);
    pdf.text('Página 1 / 1', W/2, H-3, {align:'center'});

    pdf.save(`heatmap_${Date.now()}.pdf`);
    showToast('✓ PDF exportado');
  } catch(e){
    showToast('Error al generar PDF');
    console.error(e);
  }

  configBar.style.display='';
  headerControls.style.display='';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove('show'),3000);
}

updateHeatmap();
